<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex Valerion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pixelated { image-rendering: pixelated; }
        
        /* --- SOLUCIÓN PARA TIRAS DE ANIMACIÓN --- */
        .sprite-window {
            width: 120px;
            height: 120px;
            margin: 0 auto;
            position: relative; /* Necesario para el posicionamiento absoluto del img */
            overflow: hidden; /* Corta todo lo que salga del recuadro de 120x120 */
            background: rgba(0,0,0,0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .sprite-window img {
            position: absolute; /* Sacamos la imagen del flujo normal */
            top: 0;
            left: 0;
            height: 100%; /* Forzamos la altura al contenedor (primer frame) */
            width: auto;   /* El ancho crece naturalmente (toda la tira sale del recuadro y se oculta) */
            object-fit: none; /* Evitamos que el navegador intente ajustar la imagen entera */
            object-position: top left; /* Alineamos al primer frame (arriba a la izquierda) */
            image-rendering: pixelated;
        }

        /* --- SOLUCIÓN PARA EVITAR EL PARPADEO (Placeholder CSS) --- */
        .placeholder-silhouette {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #374151; /* gray-700 */
            color: #1f2937; /* gray-800 */
            font-size: 4rem;
            font-weight: bold;
            border-radius: 50%;
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen font-sans">
    <div class="container mx-auto p-6">
        <header class="text-center mb-10">
            <h1 class="text-5xl font-black text-yellow-500 italic uppercase tracking-tighter">Valerion Dex</h1>
            <p class="text-gray-400 mt-2">Base de Datos Digital - Ingeniería de Software</p>
        </header>

        <div class="flex flex-col md:flex-row gap-4 mb-10 max-w-3xl mx-auto bg-gray-800 p-4 rounded-2xl shadow-2xl border border-gray-700">
            <input type="text" id="search" placeholder="Nombre del Pokémon..." 
                   class="flex-1 p-3 rounded-xl bg-gray-900 border-none focus:ring-2 focus:ring-yellow-500 text-white placeholder-gray-500">
            
            <select id="gen-filter" class="p-3 rounded-xl bg-gray-900 border-none focus:ring-2 focus:ring-yellow-500 text-gray-300">
                <option value="all">Todas las Regiones</option>
                <option value="Valerion">Región Valerion (Fakemon)</option>
                <option value="Gen 1">Kanto (Gen 1)</option>
                <option value="Gen 2">Johto (Gen 2)</option>
                <option value="Gen 3">Hoenn (Gen 3)</option>
                <option value="Otras">Otras Generaciones</option>
            </select>
        </div>

        <div id="pokedex" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            </div>
    </div>

    <script>
        let pokemonData = [];

        // Función para manejar imágenes faltantes sin parpadeo
        function handleMissingImage(imgElement) {
            // Ocultamos la etiqueta img rota
            imgElement.style.display = 'none';
            // Mostramos el div placeholder que está justo después en el HTML
            imgElement.nextElementSibling.style.display = 'flex';
        }

        async function init() {
            try {
                // Añadimos un timestamp para evitar cacheo durante el desarrollo
                const res = await fetch(`valerion_data.json?v=${new Date().getTime()}`);
                pokemonData = await res.json();
                updateUI();
            } catch (error) {
                document.getElementById('pokedex').innerHTML = `<p class="text-center text-red-500 col-span-4">Error cargando datos: ${error.message}</p>`;
            }
        }

        function updateUI() {
            const search = document.getElementById('search').value.toLowerCase();
            const gen = document.getElementById('gen-filter').value;

            const filtered = pokemonData.filter(p => {
                const matchesSearch = p.nombre.toLowerCase().includes(search);
                const matchesGen = (gen === 'all' || p.generacion === gen);
                return matchesSearch && matchesGen;
            });

            const container = document.getElementById('pokedex');
            if (filtered.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-500 col-span-4 py-10">No se encontraron Pokémon.</p>`;
                return;
            }

            container.innerHTML = filtered.map(p => `
                <div class="bg-gray-800 p-5 rounded-3xl hover:bg-gray-750 transition-all border-b-8 border-yellow-600 group shadow-lg">
                    <div class="sprite-window mb-4 group-hover:scale-110 transition-transform relative">
                        <img src="sprites/${p.id}.png" class="pixelated" onerror="handleMissingImage(this)" alt="${p.nombre}">
                        
                        <div class="placeholder-silhouette hidden" style="font-family: sans-serif;">?</div>
                    </div>
                    <h2 class="text-center font-bold text-xl uppercase tracking-tight text-white">${p.nombre}</h2>
                    <p class="text-center text-yellow-500 text-xs font-bold mb-3">${p.generacion}</p>
                    
                    <div class="flex justify-center gap-1 mb-4 flex-wrap">
                        ${p.tipos.map(t => `<span class="text-[10px] bg-black/40 px-2 py-1 rounded-md font-mono text-gray-300 uppercase">${t}</span>`).join('')}
                    </div>

                    <div class="space-y-1 text-[10px] font-mono opacity-80 bg-gray-900 p-3 rounded-lg">
                        <div class="flex justify-between text-gray-400"><span>HP</span><span class="text-white font-bold">${p.stats_base.hp}</span></div>
                        <div class="flex justify-between text-gray-400"><span>ATK</span><span class="text-white font-bold">${p.stats_base.atq}</span></div>
                        <div class="flex justify-between text-gray-400"><span>VEL</span><span class="text-white font-bold">${p.stats_base.vel}</span></div>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('search').addEventListener('input', updateUI);
        document.getElementById('gen-filter').addEventListener('change', updateUI);
        init();
    </script>
</body>
</html>
