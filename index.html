<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex Valerion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pixelated { image-rendering: pixelated; }
        
        /* Contenedor para sprites animados (strips) */
        .sprite-window {
            width: 120px;
            height: 120px;
            margin: 0 auto;
            overflow: hidden; /* Corta el resto de la tira de animación */
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.2);
            border-radius: 50%;
        }

        .sprite-window img {
            height: 100%; /* Forzamos la altura */
            width: auto;   /* El ancho crece según la tira, pero se oculta lo sobrante */
            object-fit: contain;
            object-position: left; /* Muestra solo el primer frame de la izquierda */
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <div class="container mx-auto p-6">
        <header class="text-center mb-10">
            <h1 class="text-5xl font-black text-yellow-500 italic uppercase tracking-tighter">Valerion Dex</h1>
            <p class="text-gray-400 mt-2">Base de Datos Digital - Ingeniería de Software</p>
        </header>

        <div class="flex flex-col md:flex-row gap-4 mb-10 max-w-3xl mx-auto bg-gray-800 p-4 rounded-2xl shadow-2xl">
            <input type="text" id="search" placeholder="Nombre del Pokémon..." 
                   class="flex-1 p-3 rounded-xl bg-gray-900 border-none focus:ring-2 focus:ring-yellow-500">
            
            <select id="gen-filter" class="p-3 rounded-xl bg-gray-900 border-none focus:ring-2 focus:ring-yellow-500">
                <option value="all">Todas las Regiones</option>
                <option value="Valerion">Región Valerion (Fakemon)</option>
                <option value="Gen 1">Kanto (Gen 1)</option>
                <option value="Gen 2">Johto (Gen 2)</option>
                <option value="Gen 3">Hoenn (Gen 3)</option>
                <option value="Otras">Otras Generaciones</option>
            </select>
        </div>

        <div id="pokedex" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </div>

    <script>
        let pokemonData = [];

        async function init() {
            const res = await fetch('valerion_data.json');
            pokemonData = await res.json();
            updateUI();
        }

        function updateUI() {
            const search = document.getElementById('search').value.toLowerCase();
            const gen = document.getElementById('gen-filter').value;

            const filtered = pokemonData.filter(p => {
                const matchesSearch = p.nombre.toLowerCase().includes(search);
                const matchesGen = (gen === 'all' || p.generacion === gen);
                return matchesSearch && matchesGen;
            });

            const container = document.getElementById('pokedex');
            container.innerHTML = filtered.map(p => `
                <div class="bg-gray-800 p-5 rounded-3xl hover:bg-gray-700 transition-all border-b-8 border-yellow-600 group">
                    <div class="sprite-window mb-4 group-hover:scale-110 transition-transform">
                        <img src="sprites/${p.id}.png" class="pixelated" onerror="this.src='https://via.placeholder.com/150?text=?'">
                    </div>
                    <h2 class="text-center font-bold text-xl uppercase">${p.nombre}</h2>
                    <p class="text-center text-yellow-500 text-xs font-bold mb-3">${p.generacion}</p>
                    
                    <div class="flex justify-center gap-1 mb-4">
                        ${p.tipos.map(t => `<span class="text-[10px] bg-black/40 px-2 py-1 rounded-md font-mono">${t}</span>`).join('')}
                    </div>

                    <div class="space-y-1 text-[10px] font-mono opacity-80">
                        <div class="flex justify-between"><span>HP</span><span>${p.stats_base.hp}</span></div>
                        <div class="flex justify-between"><span>ATK</span><span>${p.stats_base.atq}</span></div>
                        <div class="flex justify-between"><span>VEL</span><span>${p.stats_base.vel}</span></div>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('search').addEventListener('input', updateUI);
        document.getElementById('gen-filter').addEventListener('change', updateUI);
        init();
    </script>
</body>
</html>
